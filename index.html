<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Kleingewerbe App – Lager + Verkäufe + Cloud</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
<div class="max-w-xl mx-auto p-4 space-y-5">
  <h1 class="text-2xl font-bold text-center">Kleingewerbe Manager</h1>

  <!-- Tabs -->
  <div class="flex bg-white rounded-xl shadow overflow-hidden">
    <button id="btnStock"  class="flex-1 py-3" onclick="showTab('stock')">Lager</button>
    <button id="btnSales"  class="flex-1 py-3" onclick="showTab('sales')">Einnahmen</button>
    <button id="btnExp"    class="flex-1 py-3" onclick="showTab('exp')">Ausgaben</button>
    <button id="btnDash"   class="flex-1 py-3" onclick="showTab('dash')">Übersicht</button>
  </div>

  <!-- LAGER -->
  <section id="tab-stock" class="space-y-4">
    <div class="flex gap-2">
      <button class="flex-1 bg-black text-white py-3 rounded-xl" onclick="addStock()">+ Lagerartikel</button>
      <button class="bg-green-600 text-white px-4 py-3 rounded-xl" onclick="exportCSV('stock')">CSV</button>
    </div>
    <div id="stockList" class="space-y-4"></div>
  </section>

  <!-- VERKÄUFE -->
  <section id="tab-sales" class="hidden space-y-4">
    <div class="flex gap-2">
      <button class="flex-1 bg-black text-white py-3 rounded-xl" onclick="addSale()">+ Verkauf</button>
      <button class="bg-green-600 text-white px-4 py-3 rounded-xl" onclick="exportCSV('sales')">CSV</button>
    </div>
    <div id="saleList" class="space-y-4"></div>
  </section>

  <!-- AUSGABEN -->
  <section id="tab-exp" class="hidden space-y-4">
    <div class="flex gap-2">
      <button class="flex-1 bg-black text-white py-3 rounded-xl" onclick="addExpense()">+ Ausgabe</button>
      <button class="bg-green-600 text-white px-4 py-3 rounded-xl" onclick="exportCSV('exp')">CSV</button>
    </div>
    <div id="expenseList" class="space-y-4"></div>
  </section>

  <!-- ÜBERSICHT -->
  <section id="tab-dash" class="hidden space-y-4">
    <div class="bg-white p-4 rounded-2xl shadow">
      <div class="text-gray-500">Gewinn (Verkäufe − EK − Gebühren − Versandkosten − Ausgaben)</div>
      <div id="dashProfit" class="text-2xl font-bold">0 €</div>
    </div>

    <div class="bg-yellow-100 p-4 rounded-2xl shadow">
      <div class="text-gray-500">40% Steuer-Rücklage (Anzeige)</div>
      <div id="dashTax" class="text-xl font-bold">0 €</div>
    </div>

    <div class="bg-green-100 p-4 rounded-2xl shadow">
      <div class="text-gray-500">Netto nach Rücklage (Anzeige)</div>
      <div id="dashNet" class="text-2xl font-bold">0 €</div>
    </div>

    <div class="bg-white p-4 rounded-2xl shadow">
      <div class="text-gray-500">Lagerwert (EK * Bestand)</div>
      <div id="dashStockValue" class="text-xl font-bold">0 €</div>
    </div>

    <div class="bg-white p-4 rounded-2xl shadow">
      <div class="text-gray-500">Cloud-Status</div>
      <div id="cloudStatus" class="text-sm font-semibold">Verbinde…</div>
      <div class="text-xs text-gray-500 mt-1">Deine Daten synchronisieren zwischen Geräten.</div>
    </div>
  </section>
</div>

<script type="module">
/* ---------------- Firebase (Cloud Sync) ----------------
   Docs: Setup + Anonymous Auth + Rules + Offline möglich
   https://firebase.google.com/docs/web/setup
   https://firebase.google.com/docs/auth/web/anonymous-auth
   https://firebase.google.com/docs/firestore/security/get-started
*/
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
import {
  getFirestore, doc, setDoc, onSnapshot, serverTimestamp,
  enableIndexedDbPersistence
} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

/*** 1) HIER DEINE FIREBASE CONFIG EINTRAGEN ***/
const firebaseConfig = {
  // apiKey: "...",
  // authDomain: "...",
  // projectId: "...",
  // appId: "...",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// optional offline cache (kann in Safari manchmal warnen – ist ok)
try { await enableIndexedDbPersistence(db); } catch(e) {}

const KEY_LOCAL = "kleingewerbe_local_backup_v1";

/* ---------------- State + Helpers ---------------- */
let state = loadLocal() || { stock: [], sales: [], expenses: [] };
let uid = null;

function loadLocal(){
  try { return JSON.parse(localStorage.getItem(KEY_LOCAL)); } catch { return null; }
}
function saveLocal(){
  localStorage.setItem(KEY_LOCAL, JSON.stringify(state));
}

function euro(n){
  return (Number(n||0)).toLocaleString("de-DE",{style:"currency",currency:"EUR"});
}
function parseNum(v){
  if(v===null || v===undefined) return 0;
  let s = String(v).trim();
  if(!s) return 0;
  s = s.replace(/\s+/g,"");
  const lc = s.lastIndexOf(",");
  const ld = s.lastIndexOf(".");
  if(lc !== -1 && ld !== -1){
    if(lc > ld) s = s.replace(/\./g,"").replace(",",".");
    else s = s.replace(/,/g,"");
  } else {
    s = s.replace(/\./g,"").replace(",",".");
  }
  const n = parseFloat(s);
  return Number.isFinite(n) ? n : 0;
}
function uidGen(){
  return (crypto?.randomUUID?.() || (Date.now().toString(36)+Math.random().toString(36).slice(2)));
}
function today(){
  const d=new Date(); const p=x=>String(x).padStart(2,"0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}
function escAttr(s){
  return String(s ?? "").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function escHtml(s){
  return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

/* ---------------- UI Tabs ---------------- */
window.showTab = (t)=>{
  ["stock","sales","exp","dash"].forEach(x=>{
    document.getElementById("tab-"+x).classList.toggle("hidden", x!==t);
  });
  ["btnStock","btnSales","btnExp","btnDash"].forEach(id=>{
    document.getElementById(id).classList.remove("bg-black","text-white");
  });
  const map={stock:"btnStock",sales:"btnSales",exp:"btnExp",dash:"btnDash"};
  document.getElementById(map[t]).classList.add("bg-black","text-white");
  renderAll();
};

/* ---------------- Lager ---------------- */
window.addStock = ()=>{
  state.stock.push({ id: uidGen(), name:"", sku:"", ek:"", qty:"1" });
  persist();
  renderStock();
  updateDash();
};
window.delStock = (id)=>{
  state.stock = state.stock.filter(x=>x.id!==id);
  persist();
  renderAll();
};
window.updateStock = (id, field, value)=>{
  const it = state.stock.find(x=>x.id===id);
  if(!it) return;
  it[field]=value;
  persistDebounced();
  updateDash();
};

/* ---------------- Verkäufe ----------------
   Gewinn = (Verkauf + VersandKunde) - (EK*qty) - Gebühren - VersandKosten
*/
function saleProfit(s){
  const qty = Math.max(0, parseNum(s.qty)||0);
  const sell = parseNum(s.sell);
  const shipCust = parseNum(s.shipCustomer);
  const ek = parseNum(s.ek);
  const fees = parseNum(s.fees);
  const shipCost = parseNum(s.shipCost);
  return (sell + shipCust) - (ek * qty) - fees - shipCost;
}

window.addSale = ()=>{
  state.sales.push({
    id: uidGen(),
    date: today(),
    itemId:"",
    qty:"1",
    sell:"",
    shipCustomer:"",
    ek:"",
    fees:"",
    shipCost:"",
    note:""
  });
  persist();
  renderSales();
  updateDash();
};

window.delSale = (id)=>{
  state.sales = state.sales.filter(x=>x.id!==id);
  persist();
  renderAll();
};

// Lagerbestand automatisch reduzieren/erhöhen bei Artikelwechsel oder Mengenänderung
function applyStockChange(saleId, newItemId, newQty){
  const s = state.sales.find(x=>x.id===saleId);
  if(!s) return;

  const oldItemId = s.itemId;
  const oldQty = Math.max(0, parseNum(s.qty)||0);
  const qty = Math.max(0, parseNum(newQty)||0);

  // altes zurück
  if(oldItemId){
    const oldItem = state.stock.find(i=>i.id===oldItemId);
    if(oldItem) oldItem.qty = String((parseNum(oldItem.qty)||0) + oldQty);
  }

  // neues abziehen
  if(newItemId){
    const it = state.stock.find(i=>i.id===newItemId);
    if(it){
      const current = parseNum(it.qty)||0;
      if(current < qty){
        alert("Nicht genug Lagerbestand.");
        const allowed = current;
        s.qty = String(allowed);
        it.qty = String(0);
      } else {
        it.qty = String(current - qty);
        s.qty = String(qty);
      }
      // EK auto aus Lager (pro Stück)
      s.ek = it.ek ?? "";
    }
  }

  s.itemId = newItemId || "";
}

window.updateSale = (id, field, value)=>{
  const s = state.sales.find(x=>x.id===id);
  if(!s) return;

  if(field==="itemId"){
    applyStockChange(id, value, s.qty);
  } else if(field==="qty"){
    applyStockChange(id, s.itemId, value);
  } else {
    s[field]=value;
  }

  persistDebounced();
  updateSaleComputed(id);
  updateDash();
};

function updateSaleComputed(id){
  const s = state.sales.find(x=>x.id===id);
  if(!s) return;
  const profit = saleProfit(s);
  const tax = profit>0 ? profit*0.4 : 0;
  const net = profit - tax;

  const pEl = document.querySelector(`[data-sale-profit='${id}']`);
  const tEl = document.querySelector(`[data-sale-tax='${id}']`);
  const nEl = document.querySelector(`[data-sale-net='${id}']`);
  if(pEl) pEl.textContent = euro(profit);
  if(tEl) tEl.textContent = euro(tax);
  if(nEl) nEl.textContent = euro(net);
}

/* ---------------- Ausgaben ---------------- */
window.addExpense = ()=>{
  state.expenses.push({ id: uidGen(), date: today(), title:"", amount:"" });
  persist();
  renderExpenses();
  updateDash();
};
window.delExpense = (id)=>{
  state.expenses = state.expenses.filter(x=>x.id!==id);
  persist();
  renderAll();
};
window.updateExpense = (id, field, value)=>{
  const e = state.expenses.find(x=>x.id===id);
  if(!e) return;
  e[field]=value;
  persistDebounced();
  updateDash();
};

/* ---------------- Render ---------------- */
function stockOptions(selectedId){
  const opts = [`<option value="">Bitte wählen…</option>`];
  for(const it of state.stock){
    const q = parseNum(it.qty)||0;
    const label = `${it.name || "(ohne Name)"} • Bestand: ${q}`;
    opts.push(`<option value="${it.id}" ${it.id===selectedId?"selected":""}>${escHtml(label)}</option>`);
  }
  return opts.join("");
}

function renderStock(){
  const wrap=document.getElementById("stockList");
  wrap.innerHTML="";
  for(const it of state.stock){
    wrap.insertAdjacentHTML("beforeend", `
      <div class="bg-white p-4 rounded-2xl shadow space-y-3">
        <div class="text-sm font-semibold">Lagerartikel</div>
        <input class="w-full border p-2 rounded-xl" placeholder="Artikelname"
          value="${escAttr(it.name)}" oninput="updateStock('${it.id}','name',this.value)">
        <div class="grid grid-cols-2 gap-2">
          <input class="w-full border p-2 rounded-xl" placeholder="SKU (optional)"
            value="${escAttr(it.sku)}" oninput="updateStock('${it.id}','sku',this.value)">
          <input inputmode="decimal" class="w-full border p-2 rounded-xl" placeholder="EK pro Stück"
            value="${escAttr(it.ek)}" oninput="updateStock('${it.id}','ek',this.value)">
          <input inputmode="numeric" class="w-full border p-2 rounded-xl col-span-2" placeholder="Menge im Lager"
            value="${escAttr(it.qty)}" oninput="updateStock('${it.id}','qty',this.value)">
        </div>
        <button class="w-full bg-red-600 text-white py-2 rounded-xl" onclick="delStock('${it.id}')">Löschen</button>
      </div>
    `);
  }
}

function renderSales(){
  const wrap=document.getElementById("saleList");
  wrap.innerHTML="";
  for(const s of state.sales){
    const it = state.stock.find(x=>x.id===s.itemId);
    const profit = saleProfit(s);
    const tax = profit>0 ? profit*0.4 : 0;
    const net = profit - tax;

    wrap.insertAdjacentHTML("beforeend", `
      <div class="bg-white p-4 rounded-2xl shadow space-y-3">
        <div class="flex items-center justify-between">
          <div class="text-sm font-semibold">Verkauf</div>
          <button class="text-xs bg-red-600 text-white px-3 py-2 rounded-xl" onclick="delSale('${s.id}')">Löschen</button>
        </div>

        <input type="date" class="w-full border p-2 rounded-xl"
          value="${escAttr(s.date)}" onchange="updateSale('${s.id}','date',this.value)">

        <select class="w-full border p-2 rounded-xl" onchange="updateSale('${s.id}','itemId',this.value)">
          ${stockOptions(s.itemId)}
        </select>

        <div class="grid grid-cols-2 gap-2">
          <input inputmode="numeric" class="w-full border p-2 rounded-xl" placeholder="Menge"
            value="${escAttr(s.qty)}" oninput="updateSale('${s.id}','qty',this.value)">

          <input inputmode="decimal" class="w-full border p-2 rounded-xl" placeholder="Verkauf (ohne Versand)"
            value="${escAttr(s.sell)}" oninput="updateSale('${s.id}','sell',this.value)">

          <input inputmode="decimal" class="w-full border p-2 rounded-xl" placeholder="Versand vom Kunden"
            value="${escAttr(s.shipCustomer)}" oninput="updateSale('${s.id}','shipCustomer',this.value)">

          <input inputmode="decimal" class="w-full border p-2 rounded-xl" placeholder="EK pro Stück (auto)"
            value="${escAttr(s.ek)}" oninput="updateSale('${s.id}','ek',this.value)">

          <input inputmode="decimal" class="w-full border p-2 rounded-xl" placeholder="Gebühren"
            value="${escAttr(s.fees)}" oninput="updateSale('${s.id}','fees',this.value)">

          <input inputmode="decimal" class="w-full border p-2 rounded-xl" placeholder="Versandkosten (deine)"
            value="${escAttr(s.shipCost)}" oninput="updateSale('${s.id}','shipCost',this.value)">
        </div>

        <input class="w-full border p-2 rounded-xl" placeholder="Notiz"
          value="${escAttr(s.note)}" oninput="updateSale('${s.id}','note',this.value)">

        <div class="text-sm space-y-1">
          <div>Gewinn: <b data-sale-profit="${s.id}">${euro(profit)}</b></div>
          <div>40% Rücklage: <b data-sale-tax="${s.id}">${euro(tax)}</b></div>
          <div>Netto (Anzeige): <b data-sale-net="${s.id}">${euro(net)}</b></div>
        </div>

        ${it ? `<div class="text-xs text-gray-500">Aus Lager: ${escHtml(it.name || "(ohne Name)")} • Rest: ${
